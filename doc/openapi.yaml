openapi: 3.0.3
info:
  title: Card API
  version: 1.0.0
  description: |
    REST API for managing Beasts, Biomes, Programs, and Relics
    for a deck‑building card game.  
    Built with Bun + Hono + SQLite.

servers:
  - url: http://localhost:3000/api/
    description: Local development server
  - url: https://card-api.fly.dev/api/
    description: Production server

paths:

  ###############################################
  # BEAST ROUTES
  ###############################################

  /beast:
    get:
      summary: Get all beasts
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: evoColor
          schema: { type: string }
        - in: query
          name: minLevel
          schema: { type: integer }
        - in: query
          name: maxLevel
          schema: { type: integer }
        - in: query
          name: minId
          schema: { type: integer }
        - in: query
          name: maxId
          schema: { type: integer }
        - in: query
          name: order
          schema:
            type: string
            enum: [ASC, DESC]
      responses:
        "200":
          description: List of beasts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedList"

    post:
      summary: Create a new beast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeastRequest"
      responses:
        "200":
          description: Beast created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /beast/{id}:
    get:
      summary: Get a beast by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: fields
          schema: { type: string }
      responses:
        "200":
          description: Beast found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeastResponse"
        "404":
          description: Beast not found

    patch:
      summary: Update part of a beast
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchBeastRequest"
      responses:
        "200":
          description: Beast updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Replace a beast
      parameters:
        - in: path
          name: id
          required: true
          schema: { type:integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeastRequest"
      responses:
        "200":
          description: Beast replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete a beast
      parameters:
        - in: path
          name: id
          required: true
          schema: { type:integer }
      responses:
        "200":
          description: Beast deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Beast not found


  ###############################################
  # BIOME ROUTES
  ###############################################

  /biome:
    get:
      summary: Get all biomes
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: color
          schema: { type: string }
        - in: query
          name: minId
          schema: { type: integer }
        - in: query
          name: maxId
          schema: { type: integer }
        - in: query
          name: order
          schema:
            type: string
            enum: [ASC, DESC]
      responses:
        "200":
          description: List of biomes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedList"

    post:
      summary: Create a biome
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBiomeRequest"
      responses:
        "200":
          description: Biome created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /biome/{id}:
    get:
      summary: Get a biome by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: fields
          schema: { type: string }
      responses:
        "200":
          description: Biome found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiomeResponse"
        "404":
          description: Not found

    patch:
      summary: Update part of a biome
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchBiomeRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponse"

    put:
      summary: Replace a biome
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBiomeRequest"
      responses:
        "200":
          description: Replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

    delete:
      summary: Delete a biome
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"


  ###############################################
  # PROGRAM ROUTES
  ###############################################

  /program:
    get:
      summary: Get all programs
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: name
          schema: { type: string }
        - in: query
