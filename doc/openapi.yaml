          schema: { type: integer }
        - in: query
          name: order
          schema:
            type: string
            enum: [ASC, DESC]
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedList"

    post:
      summary: Create a program
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramRequest"
      responses:
        "200":
          description: Program created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /program/{id}:
    get:
      summary: Get a program by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: fields
          schema: { type: string }
      responses:
        "200":
          description: Program found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramResponse"

    patch:
      summary: Update part of a program
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProgramRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponse"

    put:
      summary: Replace a program
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramRequest"
      responses:
        "200":
          description: Replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

    delete:
      summary: Delete a program
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"


  ###############################################
  # RELIC ROUTES
  ###############################################

  /relic:
    get:
      summary: Get all relics
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: color
          schema: { type: string }
        - in: query
          name: minId
          schema: { type: integer }
        - in: query
          name: maxId
          schema: { type: integer }
        - in: query
          name: order
          schema:
            type: string
            enum: [ASC, DESC]
      responses:
        "200":
          description: List of relics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedList"

    post:
      summary: Create a relic
      requestBody:
        content:
