###############################################
# COMPONENT SCHEMAS
###############################################

components:
  schemas:

    ###############################################
    # Shared
    ###############################################

    PaginatedList:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        count: { type: integer }
        results:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }

    SuccessResponse:
      type: object
      properties:
        message: { type: string }
        success: { type: boolean }

    UpdateResponse:
      type: object
      properties:
        message: { type: string }
        success: { type: boolean }
        updatedFields:
          type: array
          items: { type: string }

    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
        success:
          type: boolean

    Effect:
      type: object
      properties:
        text: { type: string }
        trigger:
          type: array
          items: { type: string }
        available:
          type: string
          nullable: true

    SoulEffect:
      type: object
      properties:
        trigger: { type: string }
        available: { type: string }
        text: { type: string }

    Special:
      type: object
      properties:
        name: { type: string }
        text: { type: string }

    ###############################################
    # Beast Schemas
    ###############################################

    Beast:
      type: object
      required: [name, playCost, level, evoCost, evoColor]
      properties:
        name: { type: string }
        image: { type: string, nullable: true }
        playCost: { type: integer }
        level: { type: integer }
        bts: { type: integer }
        evoCost: { type: integer }
        evoColor: { type: string }
        traits:
          type: array
          items: { type: string }
        keywords:
          type: array
          items: { type: string }
        restrictions:
          type: array
          items: { type: string }
        effects:
          type: array
          items:
            $ref: "#/components/schemas/Effect"
        soulEffects:
          type: array
          items:
            $ref: "#/components/schemas/SoulEffect"
        special:
          $ref: "#/components/schemas/Special"
          nullable: true

    CreateBeastRequest:
      type: object
      properties:
        stats:
          $ref: "#/components/schemas/Beast"

    PatchBeastRequest:
      type: object
      properties:
        stats:
          type: object

    BeastResponse:
      type: object
      properties:
        id: { type: integer }
        cardType: { type: string }
        stats:
          $ref: "#/components/schemas/Beast"


    ###############################################
    # Biome Schemas
    ###############################################

    Biome:
      type: object
      required: [name, playCost, color, bitEffect]
      properties:
        name: { type: string }
        image: { type: string, nullable: true }
        playCost: { type: integer }
        color: { type: string }
        bitEffect: { type: string }
        effects:
          type: array
          items:
            $ref: "#/components/schemas/Effect"
        traits:
          type: array
          items: { type: string }
        keywords:
          type: array
          items: { type: string }

    CreateBiomeRequest:
      type: object
      properties:
        stats:
          $ref: "#/components/schemas/Biome"

    PatchBiomeRequest:
      type: object
      properties:
        stats:
          type: object

    BiomeResponse:
      type: object
      properties:
        id: { type: integer }
        cardType: { type: string }
        stats:
          $ref: "#/components/schemas/Biome"


    ###############################################
    # Program Schemas
    ###############################################

    Program:
      type: object
      required: [name, playCost, color, bitEffect]
      properties:
        name: { type: string }
        image: { type: string, nullable: true }
        playCost: { type: integer }
        color: { type: string }
        bitEffect: { type: string }
        effects:
          type: array
          items:
            $ref: "#/components/schemas/Effect"
        traits:
          type: array
          items: { type: string }
        keywords:
          type: array
          items: { type: string }

    CreateProgramRequest:
      type: object
      properties:
        stats:
          $ref: "#/components/schemas/Program"

    PatchProgramRequest:
      type: object
      properties:
        stats:
          type: object

    ProgramResponse:
      type: